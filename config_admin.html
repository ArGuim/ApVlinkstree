<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Gerenciar Links</title>

  <!-- Firebase SDKs (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; padding: 24px 16px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .sub { color: #888; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      margin-bottom: 12px;
    }
    button {
      background: #FF8C00;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
    }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-success { background: #10b981; }
    .link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .status {
      position: fixed; bottom: 20px; right: 20px;
      background: #10b981; padding: 8px 16px;
      border-radius: 50px; font-size: 12px;
    }
    .login-box, .admin-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .error { color: #f87171; margin-top: 12px; text-align: center; }
    .logout-btn { text-align: right; margin-bottom: 16px; }
    .logout-btn button { width: auto; padding: 8px 16px; background: #333; }
  </style>
</head>
<body>

<div id="loginSection" class="container" style="max-width: 400px;">
  <div class="login-box">
    <h1><i class="fa-solid fa-lock"></i> Área Restrita</h1>
    <p class="sub">Digite suas credenciais</p>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div id="adminPanel" style="display: none;">
  <div class="container">
    <div class="logout-btn"><button onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Sair</button></div>
    <h1><i class="fa-solid fa-gear"></i> Painel Admin</h1>
    <p class="sub">Gerencie sua árvore de links de afiliado</p>

    <div class="card"><h2><i class="fa-solid fa-store"></i> Configurações Gerais</h2>
      <input type="text" id="siteNome" placeholder="Nome do site (ex: Achado para Você)">
      <input type="text" id="siteBio" placeholder="Biografia">
      <input type="text" id="logoUrl" placeholder="URL da logo (Google Drive)">
      <input type="text" id="facebookUrl" placeholder="Facebook URL">
      <input type="text" id="instagramUrl" placeholder="Instagram URL">
      <input type="text" id="whatsappUrl" placeholder="WhatsApp URL">
    </div>

    <div class="card"><h2><i class="fa-solid fa-bolt"></i> Oferta Relâmpago (com timer)</h2>
      <input type="text" id="relampagoTitulo" placeholder="Título do produto">
      <input type="text" id="relampagoUrl" placeholder="Link de afiliado">
      <input type="number" id="relampagoTimer" placeholder="Horas do timer" value="2">
      <button id="saveRelampago" class="btn-success">Salvar</button>
      <button id="removeRelampago" class="btn-danger">Remover</button>
    </div>

    <div class="card"><h2><i class="fa-solid fa-fire"></i> Destaque (sem timer)</h2>
      <input type="text" id="destaqueTitulo" placeholder="Título do produto">
      <input type="text" id="destaqueUrl" placeholder="Link de afiliado">
      <button id="saveDestaque" class="btn-success">Salvar</button>
      <button id="removeDestaque" class="btn-danger">Remover</button>
    </div>

    <div class="card"><h2><i class="fa-solid fa-bag-shopping"></i> Shopee</h2>
      <div id="shopeeList"></div>
      <input type="text" id="shopeeTitulo" placeholder="Título">
      <input type="text" id="shopeeUrl" placeholder="Link">
      <button id="addShopee">Adicionar Link</button>
    </div>

    <div class="card"><h2><i class="fa-solid fa-truck-fast"></i> Mercado Livre</h2>
      <div id="mlList"></div>
      <input type="text" id="mlTitulo" placeholder="Título">
      <input type="text" id="mlUrl" placeholder="Link">
      <button id="addMl">Adicionar Link</button>
    </div>

    <div class="card"><h2><i class="fa-brands fa-amazon"></i> Amazon</h2>
      <div id="amazonList"></div>
      <input type="text" id="amazonTitulo" placeholder="Título">
      <input type="text" id="amazonUrl" placeholder="Link">
      <button id="addAmazon">Adicionar Link</button>
    </div>

    <div class="card"><h2><i class="fa-solid fa-ticket"></i> Cupons</h2>
      <div id="cuponsList"></div>
      <input type="text" id="cupomCodigo" placeholder="Código">
      <input type="text" id="cupomDesconto" placeholder="Desconto (ex: 10% OFF)">
      <button id="addCupom">Adicionar Cupom</button>
    </div>

    <button id="saveAll" style="width: 100%; padding: 14px;"><i class="fa-solid fa-floppy-disk"></i> Salvar Todas as Configurações</button>
    <div id="status" class="status" style="display: none;">✅ Salvo!</div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyANJbYgU2cFU8w8alKDClO22ocjIywP__s",
    authDomain: "apvlinkstree.firebaseapp.com",
    projectId: "apvlinkstree",
    storageBucket: "apvlinkstree.firebasestorage.app",
    messagingSenderId: "1051197353813",
    appId: "1:1051197353813:web:7811ac8359b096ca2c49dc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  let config = {
    nome: 'Achado para Você', bio: '🚀 Ofertas imperdíveis | Cupons exclusivos',
    logoUrl: '', facebook: '', instagram: '', whatsapp: '',
    relampago: null, destaque: null,
    shopee: [], mercadoLivre: [], amazon: [], cupons: []
  };

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadFromFirestore();
      })
      .catch(() => document.getElementById('loginError').textContent = 'Email ou senha inválidos');
  }
  function logout() {
    auth.signOut().then(() => {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
    });
  }
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadFromFirestore();
    }
  });

  async function loadFromFirestore() {
    try {
      const doc = await db.collection('config').doc('geral').get();
      if (doc.exists) config = { ...config, ...doc.data() };
      renderAll();
    } catch (error) { renderAll(); }
  }

  async function saveToFirestore() {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = '💾 Salvando...';
    statusDiv.style.display = 'block';
    try {
      await db.collection('config').doc('geral').set(config);
      statusDiv.textContent = '✅ Salvo!';
      setTimeout(() => { statusDiv.style.display = 'none'; }, 2000);
    } catch (error) {
      statusDiv.textContent = '❌ Erro ao salvar!';
      setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }
  }

  function renderAll() {
    document.getElementById('siteNome').value = config.nome || '';
    document.getElementById('siteBio').value = config.bio || '';
    document.getElementById('logoUrl').value = config.logoUrl || '';
    document.getElementById('facebookUrl').value = config.facebook || '';
    document.getElementById('instagramUrl').value = config.instagram || '';
    document.getElementById('whatsappUrl').value = config.whatsapp || '';
    if (config.relampago) {
      document.getElementById('relampagoTitulo').value = config.relampago.titulo || '';
      document.getElementById('relampagoUrl').value = config.relampago.url || '';
      document.getElementById('relampagoTimer').value = config.relampago.timerHoras || 2;
    }
    if (config.destaque) {
      document.getElementById('destaqueTitulo').value = config.destaque.titulo || '';
      document.getElementById('destaqueUrl').value = config.destaque.url || '';
    }
    renderList('shopeeList', config.shopee, 'shopee');
    renderList('mlList', config.mercadoLivre, 'ml');
    renderList('amazonList', config.amazon, 'amazon');
    renderCupons();
  }

  function renderList(containerId, items, type) {
    const container = document.getElementById(containerId);
    if (!items.length) { container.innerHTML = '<p style="color:#666;">Nenhum link</p>'; return; }
    container.innerHTML = items.map((item, idx) => `<div class="link-item"><span>${item.titulo}</span><button onclick="removeItem('${type}',${idx})">Remover</button></div>`).join('');
  }
  function renderCupons() {
    const container = document.getElementById('cuponsList');
    if (!config.cupons.length) { container.innerHTML = '<p style="color:#666;">Nenhum cupom</p>'; return; }
    container.innerHTML = config.cupons.map((cupom, idx) => `<div class="link-item"><span><strong>${cupom.codigo}</strong> - ${cupom.desconto}</span><button onclick="removeCupom(${idx})">Remover</button></div>`).join('');
  }
  window.removeItem = (type, idx) => {
    if (type === 'shopee') config.shopee.splice(idx,1);
    if (type === 'ml') config.mercadoLivre.splice(idx,1);
    if (type === 'amazon') config.amazon.splice(idx,1);
    renderAll();
  };
  window.removeCupom = idx => { config.cupons.splice(idx,1); renderAll(); };
  function updateConfigFromInputs() {
    config.nome = document.getElementById('siteNome').value;
    config.bio = document.getElementById('siteBio').value;
    config.logoUrl = document.getElementById('logoUrl').value;
    config.facebook = document.getElementById('facebookUrl').value;
    config.instagram = document.getElementById('instagramUrl').value;
    config.whatsapp = document.getElementById('whatsappUrl').value;
  }

  document.getElementById('saveRelampago').onclick = () => {
    const titulo = document.getElementById('relampagoTitulo').value;
    const url = document.getElementById('relampagoUrl').value;
    const timerHoras = parseInt(document.getElementById('relampagoTimer').value) || 2;
    if (titulo && url) { config.relampago = { titulo, url, timerHoras }; renderAll(); }
  };
  document.getElementById('removeRelampago').onclick = () => { config.relampago = null; renderAll(); };
  document.getElementById('saveDestaque').onclick = () => {
    const titulo = document.getElementById('destaqueTitulo').value;
    const url = document.getElementById('destaqueUrl').value;
    if (titulo && url) { config.destaque = { titulo, url }; renderAll(); }
  };
  document.getElementById('removeDestaque').onclick = () => { config.destaque = null; renderAll(); };
  document.getElementById('addShopee').onclick = () => {
    const t = document.getElementById('shopeeTitulo').value, u = document.getElementById('shopeeUrl').value;
    if (t && u) { config.shopee.push({ titulo:t, url:u }); document.getElementById('shopeeTitulo').value = ''; document.getElementById('shopeeUrl').value = ''; renderAll(); }
  };
  document.getElementById('addMl').onclick = () => {
    const t = document.getElementById('mlTitulo').value, u = document.getElementById('mlUrl').value;
    if (t && u) { config.mercadoLivre.push({ titulo:t, url:u }); document.getElementById('mlTitulo').value = ''; document.getElementById('mlUrl').value = ''; renderAll(); }
  };
  document.getElementById('addAmazon').onclick = () => {
    const t = document.getElementById('amazonTitulo').value, u = document.getElementById('amazonUrl').value;
    if (t && u) { config.amazon.push({ titulo:t, url:u }); document.getElementById('amazonTitulo').value = ''; document.getElementById('amazonUrl').value = ''; renderAll(); }
  };
  document.getElementById('addCupom').onclick = () => {
    const c = document.getElementById('cupomCodigo').value, d = document.getElementById('cupomDesconto').value;
    if (c && d) { config.cupons.push({ codigo:c, desconto:d }); document.getElementById('cupomCodigo').value = ''; document.getElementById('cupomDesconto').value = ''; renderAll(); }
  };
  document.getElementById('saveAll').onclick = async () => { updateConfigFromInputs(); await saveToFirestore(); };
</script>
</body>
</html>
