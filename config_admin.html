<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Gerenciar Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 24px 16px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .sub { color: #888; margin-bottom: 32px; }
    
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    input, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      margin-bottom: 12px;
    }
    input:focus, textarea:focus { outline: none; border-color: #FF8C00; }
    
    button {
      background: #FF8C00;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
    }
    button:hover { background: #e07c00; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #10b981; }
    
    .link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .link-item span { font-size: 14px; }
    .link-item button { padding: 4px 12px; font-size: 12px; }
    
    hr { border-color: rgba(255,255,255,0.1); margin: 16px 0; }
    
    .status { 
      position: fixed; bottom: 20px; right: 20px;
      background: #10b981; padding: 8px 16px;
      border-radius: 50px; font-size: 12px;
    }
    .error-status {
      background: #dc2626;
    }
  </style>
</head>
<body>
<div class="container">
  <h1><i class="fa-solid fa-gear"></i> Painel Admin</h1>
  <p class="sub">Gerencie sua árvore de links de afiliado</p>
  
  <div class="card">
    <h2><i class="fa-solid fa-store"></i> Configurações Gerais</h2>
    <input type="text" id="siteNome" placeholder="Nome do site (ex: Achado para Você)">
    <input type="text" id="siteBio" placeholder="Biografia">
    <input type="text" id="logoUrl" placeholder="URL da logo (Google Drive)">
    <input type="text" id="facebookUrl" placeholder="Facebook URL">
    <input type="text" id="instagramUrl" placeholder="Instagram URL">
    <input type="text" id="whatsappUrl" placeholder="WhatsApp URL (link do grupo/canal)">
  </div>
  
  <div class="card">
    <h2><i class="fa-solid fa-bolt"></i> Oferta Relâmpago (com timer)</h2>
    <input type="text" id="relampagoTitulo" placeholder="Título do produto">
    <input type="text" id="relampagoUrl" placeholder="Link de afiliado">
    <input type="number" id="relampagoTimer" placeholder="Horas do timer (ex: 2)" value="2">
    <button id="saveRelampago" class="btn-success">Salvar Oferta</button>
    <button id="removeRelampago" class="btn-danger">Remover</button>
  </div>
  
  <div class="card">
    <h2><i class="fa-solid fa-fire"></i> Produto Destaque (sem timer)</h2>
    <input type="text" id="destaqueTitulo" placeholder="Título do produto">
    <input type="text" id="destaqueUrl" placeholder="Link de afiliado">
    <button id="saveDestaque" class="btn-success">Salvar Destaque</button>
    <button id="removeDestaque" class="btn-danger">Remover</button>
  </div>
  
  <div class="card">
    <h2><i class="fa-solid fa-bag-shopping"></i> Shopee</h2>
    <div id="shopeeList"></div>
    <input type="text" id="shopeeTitulo" placeholder="Título do produto">
    <input type="text" id="shopeeUrl" placeholder="Link de afiliado">
    <button id="addShopee">Adicionar Link</button>
  </div>
  
  <div class="card">
    <h2><i class="fa-solid fa-truck-fast"></i> Mercado Livre</h2>
    <div id="mlList"></div>
    <input type="text" id="mlTitulo" placeholder="Título do produto">
    <input type="text" id="mlUrl" placeholder="Link de afiliado">
    <button id="addMl">Adicionar Link</button>
  </div>
  
  <div class="card">
    <h2><i class="fa-brands fa-amazon"></i> Amazon</h2>
    <div id="amazonList"></div>
    <input type="text" id="amazonTitulo" placeholder="Título do produto">
    <input type="text" id="amazonUrl" placeholder="Link de afiliado">
    <button id="addAmazon">Adicionar Link</button>
  </div>
  
  <div class="card">
    <h2><i class="fa-solid fa-ticket"></i> Cupons</h2>
    <div id="cuponsList"></div>
    <input type="text" id="cupomCodigo" placeholder="Código do cupom (ex: OFERTA10)">
    <input type="text" id="cupomDesconto" placeholder="Descrição (ex: 10% OFF)">
    <button id="addCupom">Adicionar Cupom</button>
  </div>
  
  <button id="saveAll" style="width: 100%; padding: 14px;"><i class="fa-solid fa-floppy-disk"></i> Salvar Todas as Configurações</button>
  
  <div id="status" class="status" style="display: none;">✅ Salvo!</div>
</div>

<script>
  let config = {
    nome: 'Achado para Você',
    bio: '🚀 Ofertas imperdíveis | Cupons exclusivos',
    logoUrl: '',
    facebook: '',
    instagram: '',
    whatsapp: '',
    relampago: null,
    destaque: null,
    shopee: [],
    mercadoLivre: [],
    amazon: [],
    cupons: []
  };
  
  async function loadFromGitHub() {
    try {
      const response = await fetch('/_data/config.json');
      if (response.ok) {
        const data = await response.json();
        config = { ...config, ...data };
      }
      renderAll();
    } catch (error) {
      console.error('Erro ao carregar do GitHub:', error);
      renderAll();
    }
  }
  
  async function saveToGitHub() {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = '💾 Salvando...';
    statusDiv.style.display = 'block';
    statusDiv.classList.remove('error-status');
    
    try {
      const response = await fetch('/.netlify/functions/git-gateway/_data/config.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config)
      });
      
      if (response.ok) {
        statusDiv.textContent = '✅ Salvo no GitHub!';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 2000);
      } else {
        throw new Error('Erro ao salvar');
      }
    } catch (error) {
      console.error('Erro ao salvar:', error);
      statusDiv.textContent = '❌ Erro ao salvar! Verifique Git Gateway';
      statusDiv.classList.add('error-status');
      setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }
  }
  
  function renderAll() {
    document.getElementById('siteNome').value = config.nome || '';
    document.getElementById('siteBio').value = config.bio || '';
    document.getElementById('logoUrl').value = config.logoUrl || '';
    document.getElementById('facebookUrl').value = config.facebook || '';
    document.getElementById('instagramUrl').value = config.instagram || '';
    document.getElementById('whatsappUrl').value = config.whatsapp || '';
    
    if (config.relampago) {
      document.getElementById('relampagoTitulo').value = config.relampago.titulo || '';
      document.getElementById('relampagoUrl').value = config.relampago.url || '';
      document.getElementById('relampagoTimer').value = config.relampago.timerHoras || 2;
    }
    
    if (config.destaque) {
      document.getElementById('destaqueTitulo').value = config.destaque.titulo || '';
      document.getElementById('destaqueUrl').value = config.destaque.url || '';
    }
    
    renderList('shopeeList', config.shopee, 'shopee');
    renderList('mlList', config.mercadoLivre, 'ml');
    renderList('amazonList', config.amazon, 'amazon');
    renderListCupons();
  }
  
  function renderList(containerId, items, type) {
    const container = document.getElementById(containerId);
    if (!items || items.length === 0) {
      container.innerHTML = '<p style="color:#666; font-size:13px;">Nenhum link adicionado</p>';
      return;
    }
    container.innerHTML = items.map((item, idx) => `
      <div class="link-item">
        <span>${item.titulo}</span>
        <button onclick="removeItem('${type}', ${idx})">Remover</button>
      </div>
    `).join('');
  }
  
  function renderListCupons() {
    const container = document.getElementById('cuponsList');
    if (!config.cupons || config.cupons.length === 0) {
      container.innerHTML = '<p style="color:#666; font-size:13px;">Nenhum cupom adicionado</p>';
      return;
    }
    container.innerHTML = config.cupons.map((cupom, idx) => `
      <div class="link-item">
        <span><strong>${cupom.codigo}</strong> - ${cupom.desconto}</span>
        <button onclick="removeCupom(${idx})">Remover</button>
      </div>
    `).join('');
  }
  
  window.removeItem = function(type, idx) {
    if (type === 'shopee') config.shopee.splice(idx, 1);
    if (type === 'ml') config.mercadoLivre.splice(idx, 1);
    if (type === 'amazon') config.amazon.splice(idx, 1);
    renderAll();
  };
  
  window.removeCupom = function(idx) {
    config.cupons.splice(idx, 1);
    renderAll();
  };
  
  function updateConfigFromInputs() {
    config.nome = document.getElementById('siteNome').value;
    config.bio = document.getElementById('siteBio').value;
    config.logoUrl = document.getElementById('logoUrl').value;
    config.facebook = document.getElementById('facebookUrl').value;
    config.instagram = document.getElementById('instagramUrl').value;
    config.whatsapp = document.getElementById('whatsappUrl').value;
  }
  
  document.getElementById('saveRelampago').onclick = () => {
    const titulo = document.getElementById('relampagoTitulo').value;
    const url = document.getElementById('relampagoUrl').value;
    const timerHoras = parseInt(document.getElementById('relampagoTimer').value) || 2;
    if (titulo && url) {
      config.relampago = { titulo, url, timerHoras };
      renderAll();
    }
  };
  
  document.getElementById('removeRelampago').onclick = () => {
    config.relampago = null;
    renderAll();
  };
  
  document.getElementById('saveDestaque').onclick = () => {
    const titulo = document.getElementById('destaqueTitulo').value;
    const url = document.getElementById('destaqueUrl').value;
    if (titulo && url) {
      config.destaque = { titulo, url };
      renderAll();
    }
  };
  
  document.getElementById('removeDestaque').onclick = () => {
    config.destaque = null;
    renderAll();
  };
  
  document.getElementById('addShopee').onclick = () => {
    const titulo = document.getElementById('shopeeTitulo').value;
    const url = document.getElementById('shopeeUrl').value;
    if (titulo && url) {
      config.shopee.push({ titulo, url });
      document.getElementById('shopeeTitulo').value = '';
      document.getElementById('shopeeUrl').value = '';
      renderAll();
    }
  };
  
  document.getElementById('addMl').onclick = () => {
    const titulo = document.getElementById('mlTitulo').value;
    const url = document.getElementById('mlUrl').value;
    if (titulo && url) {
      config.mercadoLivre.push({ titulo, url });
      document.getElementById('mlTitulo').value = '';
      document.getElementById('mlUrl').value = '';
      renderAll();
    }
  };
  
  document.getElementById('addAmazon').onclick = () => {
    const titulo = document.getElementById('amazonTitulo').value;
    const url = document.getElementById('amazonUrl').value;
    if (titulo && url) {
      config.amazon.push({ titulo, url });
      document.getElementById('amazonTitulo').value = '';
      document.getElementById('amazonUrl').value = '';
      renderAll();
    }
  };
  
  document.getElementById('addCupom').onclick = () => {
    const codigo = document.getElementById('cupomCodigo').value;
    const desconto = document.getElementById('cupomDesconto').value;
    if (codigo && desconto) {
      config.cupons.push({ codigo, desconto });
      document.getElementById('cupomCodigo').value = '';
      document.getElementById('cupomDesconto').value = '';
      renderAll();
    }
  };
  
  document.getElementById('saveAll').onclick = async () => {
    updateConfigFromInputs();
    await saveToGitHub();
  };
  
  loadFromGitHub();
</script>
</body>
</html>
